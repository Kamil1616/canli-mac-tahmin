<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Canlı Maç Tahmin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--card:#111827;--card2:#1a2235;--border:#1e2d45;
  --text:#e2e8f0;--muted:#64748b;--accent:#3b82f6;--green:#22c55e;
  --red:#ef4444;--yellow:#f59e0b;--orange:#f97316;--live:#ef4444;
  --signal:#10b981;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header-logo{font-size:20px}
.header-title{font-weight:700;font-size:16px}
.header-subtitle{font-size:11px;color:var(--muted)}
.live-badge{background:var(--live);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;animation:pulse 1.5s infinite;margin-left:auto}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.date-tabs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border)}
.date-tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.controls{padding:10px 16px;display:flex;gap:8px;align-items:center;background:var(--bg)}
.search-box{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
.filter-btn{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s;white-space:nowrap}
.filter-btn.active{background:var(--live);color:#fff;border-color:var(--live)}
.stats-bar{display:flex;gap:16px;padding:8px 16px;background:var(--card2);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted)}
.stat-item span{color:var(--text);font-weight:600}
.fixtures{padding:8px 16px;display:flex;flex-direction:column;gap:6px}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.match-card:hover{border-color:var(--accent)}
.match-card.live-card{border-color:rgba(239,68,68,0.4)}
.match-card.has-signal{border-color:rgba(16,185,129,0.5)}
.card-header{padding:6px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--card2);gap:8px}
.league-info{font-size:10px;color:var(--muted);white-space:nowrap}
.signal-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.signal-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;background:rgba(16,185,129,0.15);color:var(--signal);border:1px solid rgba(16,185,129,0.3);white-space:nowrap}
.signal-badge.value{background:rgba(245,158,11,0.15);color:#fbbf24;border-color:rgba(245,158,11,0.4)}
.card-body{padding:10px 12px;display:flex;align-items:center;gap:8px}
.team-block{flex:1}
.team-name{font-size:13px;font-weight:600}
.team-name.away{text-align:right}
.match-center{display:flex;flex-direction:column;align-items:center;flex-shrink:0;min-width:70px;gap:1px}
.match-time{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
.match-time.live{color:var(--live);font-weight:700}
.match-score{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:var(--accent)}
.vs-text{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
.ht-score{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);opacity:0.65}
.detail-panel{display:none;padding:12px;border-top:1px solid var(--border);background:var(--bg)}
.detail-panel.open{display:block}
.detail-loading{text-align:center;padding:20px;color:var(--muted);font-size:13px}
.pred-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pred-box{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px}
.pred-box-title{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.prob-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.prob-label{font-size:12px;font-weight:600;min-width:60px}
.prob-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:6px}
.prob-bar{height:6px;border-radius:4px;background:var(--accent);transition:width .5s}
.prob-bar.green{background:var(--green)}
.prob-bar.red{background:var(--red)}
.prob-val{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;min-width:38px;text-align:right}
.over-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px}
.over-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px;text-align:center}
.over-label{font-size:9px;color:var(--muted);font-weight:600}
.over-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--accent)}
.iy-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px}
.iy-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.iy-label{font-size:9px;color:var(--muted);font-weight:600;margin-bottom:2px}
.iy-val{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:var(--green)}
.odds-row{display:flex;gap:6px;margin-bottom:10px}
.odds-box{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.odds-label{font-size:9px;color:var(--muted);font-weight:600;margin-bottom:3px}
.odds-val{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;color:var(--yellow)}
.odds-val.value{color:#fbbf24;background:rgba(245,158,11,0.1);border-radius:4px;padding:1px 4px}
.signals-section{margin-bottom:10px}
.signals-title{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px;text-transform:uppercase}
.signal-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;margin-bottom:4px;background:var(--card2);border:1px solid var(--border)}
.signal-item-label{font-size:12px;font-weight:700}
.signal-item-prob{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--signal)}
.live-stats-grid{display:flex;flex-direction:column;gap:4px}
.stat-row{display:flex;align-items:center;gap:6px}
.stat-name{font-size:11px;color:var(--muted);flex:1;text-align:center}
.stat-home-val{font-size:12px;font-weight:700;min-width:24px;text-align:right}
.stat-away-val{font-size:12px;font-weight:700;min-width:24px}
.stat-bar-wrap{flex:2;display:flex;gap:2px;height:5px}
.stat-bar-h{height:5px;border-radius:2px 0 0 2px;background:var(--accent);transition:width .5s}
.stat-bar-a{height:5px;border-radius:0 2px 2px 0;background:var(--orange);transition:width .5s}
.section-label{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.no-data{text-align:center;padding:40px;color:var(--muted)}
.no-data-icon{font-size:40px;margin-bottom:8px}
.loader{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--border);margin:10px 0}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">⚡</div>
  <div>
    <div class="header-title">Canlı Tahmin</div>
    <div class="header-subtitle">Anlık Maç Analizi</div>
  </div>
  <div id="liveBadge" style="display:none" class="live-badge">● CANLI</div>
</div>

<div class="date-tabs" id="dateTabs"></div>

<div class="controls">
  <input class="search-box" id="searchBox" placeholder="🔍 Takım ara..." oninput="renderFixtures()">
  <button class="filter-btn active" id="btnAll" onclick="setFilter('all')">Tümü</button>
  <button class="filter-btn" id="btnLive" onclick="setFilter('live')">🔴 Canlı</button>
  <button class="filter-btn" id="btnSignal" onclick="setFilter('signal')">⚡ Sinyal</button>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-item">Toplam <span id="stTotal">0</span></div>
  <div class="stat-item">🔴 Canlı <span id="stLive">0</span></div>
  <div class="stat-item">⚡ Sinyal <span id="stSignal">0</span></div>
</div>

<div id="fixturesList"></div>

<script>
var allFixtures = [];
var currentDate = '';
var activeFilter = 'all';
var analysisCache = {};
var openCards = {};
var analyzeQueue = [];
var analyzeRunning = false;

// ─── DATE TABS ───────────────────────────────────────────────────────────────
function buildDateTabs(dates) {
  var today = getTodayLocal();
  var html = '';
  dates.forEach(function(d) {
    var label = d === today ? 'Bugün' : formatDateTab(d);
    var cls = d === currentDate ? ' active' : '';
    html += '<button class="tab'+cls+'" onclick="switchDate(\''+d+'\')">'+label+'</button>';
  });
  document.getElementById('dateTabs').innerHTML = html;
}

function formatDateTab(d) {
  var dt = new Date(d + 'T12:00:00');
  var days = ['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
  return days[dt.getDay()] + ' ' + dt.getDate();
}

function switchDate(date) {
  currentDate = date;
  buildDateTabs(window._allDates || [date]);
  loadDate(date);
}

// ─── LOAD DATE ───────────────────────────────────────────────────────────────
function loadDate(date) {
  document.getElementById('fixturesList').innerHTML = '<div class="no-data"><div class="no-data-icon"><div class="loader"></div></div><div>Maçlar yükleniyor...</div></div>';
  fetch('/api/fixtures?date=' + date)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      allFixtures = data.fixtures || [];
      analysisCache = {};
      openCards = {};
      renderFixtures();
      updateStats();
      startPreAnalyze(date);
    })
    .catch(function() {
      document.getElementById('fixturesList').innerHTML = '<div class="no-data"><div class="no-data-icon">⚠️</div><div>Veri yüklenemedi</div></div>';
    });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderFixtures() {
  var search = document.getElementById('searchBox').value.toLowerCase();
  var list = allFixtures.filter(function(f) {
    if(search && f.home_team_name.toLowerCase().indexOf(search) < 0 && f.away_team_name.toLowerCase().indexOf(search) < 0) return false;
    var s = f.status;
    if(activeFilter === 'live') return s === '1H' || s === '2H' || s === 'HT' || s === 'ET';
    if(activeFilter === 'signal') {
      var a = analysisCache[f.fixture_id];
      return a && a.signals && a.signals.length > 0;
    }
    return true;
  });

  if(list.length === 0) {
    document.getElementById('fixturesList').innerHTML = '<div class="no-data"><div class="no-data-icon">⚽</div><div>Maç bulunamadı</div></div>';
    return;
  }

  var html = '<div class="fixtures">';
  list.forEach(function(f) { html += buildCard(f); });
  html += '</div>';
  document.getElementById('fixturesList').innerHTML = html;

  var liveCount = list.filter(function(f) { return ['1H','2H','HT','ET','PEN'].indexOf(f.status) >= 0; }).length;
  document.getElementById('liveBadge').style.display = liveCount > 0 ? '' : 'none';
}

// ─── KART ────────────────────────────────────────────────────────────────────
function buildCard(f) {
  var isLive = ['1H','2H','HT','ET','PEN'].indexOf(f.status) >= 0;
  var isFT = f.status === 'FT';
  var hasScore = f.home_goals !== null && f.home_goals !== undefined;
  var analysis = analysisCache[f.fixture_id];
  var signals = analysis ? (analysis.signals || []) : [];
  var hasSignal = signals.length > 0;

  // Zaman
  var timeStr = '--:--';
  var timeClass = 'match-time';
  if(f.time) {
    var d = new Date(f.time);
    timeStr = pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  if(isLive) {
    timeClass = 'match-time live';
    if(f.elapsed === 'HT') timeStr = '● HT';
    else if(typeof f.elapsed === 'number') timeStr = '● ' + f.elapsed + "'";
    else timeStr = '● CANLI';
  } else if(isFT) {
    timeStr = 'MS';
  }

  // Skor
  var scoreHtml = hasScore
    ? '<div class="match-score">' + f.home_goals + ' - ' + f.away_goals + '</div>'
    : '<div class="vs-text">VS</div>';
  var htHtml = (hasScore && f.home_ht_goals !== null && f.home_ht_goals !== undefined)
    ? '<div class="ht-score">İY ' + f.home_ht_goals + '-' + f.away_ht_goals + '</div>'
    : '';

  // Badges
  var badgesHtml = buildBadges(signals, analysis);

  var cardClass = 'match-card' + (isLive ? ' live-card' : '') + (hasSignal ? ' has-signal' : '');

  return '<div class="'+cardClass+'" id="card_'+f.fixture_id+'" onclick="toggleDetail(\''+f.fixture_id+'\')">' +
    '<div class="card-header">' +
      '<div class="league-info">'+esc(f.league_name||f.league_slug||'')+'</div>' +
      '<div id="badges_'+f.fixture_id+'" class="signal-badges">'+badgesHtml+'</div>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="team-block"><div class="team-name">'+esc(f.home_team_name||'?')+'</div></div>' +
      '<div class="match-center">' +
        '<div class="'+timeClass+'">'+timeStr+'</div>' +
        scoreHtml + htHtml +
      '</div>' +
      '<div class="team-block"><div class="team-name away">'+esc(f.away_team_name||'?')+'</div></div>' +
    '</div>' +
    '<div class="detail-panel" id="detail_'+f.fixture_id+'"></div>' +
  '</div>';
}

function buildBadges(signals, analysis) {
  var html = '';
  signals.forEach(function(s) {
    var pct = typeof s.prob === 'number' ? Math.round(s.prob * 100) + '%' : '';
    var cls = s.value ? ' class="signal-badge value"' : ' class="signal-badge"';
    html += '<span'+cls+'>' + esc(s.label) + ' ' + pct + '</span>';
  });
  return html;
}

// ─── DETAIL PANEL ────────────────────────────────────────────────────────────
function toggleDetail(fid) {
  var panel = document.getElementById('detail_' + fid);
  if(!panel) return;
  if(openCards[fid]) {
    panel.classList.remove('open');
    openCards[fid] = false;
    return;
  }
  openCards[fid] = true;
  panel.classList.add('open');
  if(analysisCache[fid]) {
    panel.innerHTML = buildDetailHtml(analysisCache[fid]);
    return;
  }
  panel.innerHTML = '<div class="detail-loading"><div class="loader"></div> Analiz yapılıyor...</div>';
  fetchAnalysis(fid, currentDate, function(data) {
    if(openCards[fid] && panel) panel.innerHTML = buildDetailHtml(data);
  });
}

function buildDetailHtml(data) {
  if(!data || (!data.pregame && !data.prediction)) {
    return '<div class="detail-loading" style="color:var(--red)">⚠️ Analiz yapılamadı (yetersiz veri)</div>';
  }

  var html = '';
  var pred = data.prediction || {};
  var pregame = pred.pregame || data.pregame || {};
  var liveData = pred.live || data.live || {};
  var signals = data.signals || [];
  var liveStats = data.live_stats;
  var odds = data.odds;
  var fixture = data.fixture || {};
  var isLive = ['1H','2H','HT','ET','PEN'].indexOf(fixture.status) >= 0;

  // ─── SİNYALLER ───
  if(signals.length > 0) {
    html += '<div class="signals-section">';
    html += '<div class="signals-title">⚡ Sinyaller</div>';
    signals.forEach(function(s) {
      var pct = typeof s.prob === 'number' ? Math.round(s.prob * 100) + '%' : '';
      var extra = s.value ? ' — ODD: ' + s.odd + ' (EV: +' + s.ev + ')' : '';
      html += '<div class="signal-item">' +
        '<div class="signal-item-label">' + esc(s.label) + extra + '</div>' +
        '<div class="signal-item-prob">' + pct + '</div>' +
      '</div>';
    });
    html += '</div>';
  }

  // ─── ORANLAR ───
  if(odds && (odds.home || odds.draw || odds.away)) {
    html += '<div class="section-label">📋 Bookmaker Oranları (' + esc(odds.bookmaker||'') + ')</div>';
    html += '<div class="odds-row">';
    var oddsLabels = [['home','1 (Ev)'],['draw','X (Ber)'],['away','2 (Dep)']];
    oddsLabels.forEach(function(pair) {
      var val = odds[pair[0]];
      html += '<div class="odds-box"><div class="odds-label">'+pair[1]+'</div><div class="odds-val">'+(val||'-')+'</div></div>';
    });
    html += '</div>';
    if(odds.over_2_5 || odds.under_2_5) {
      html += '<div class="odds-row">';
      html += '<div class="odds-box"><div class="odds-label">2.5 Üst</div><div class="odds-val">'+(odds.over_2_5||'-')+'</div></div>';
      html += '<div class="odds-box"><div class="odds-label">2.5 Alt</div><div class="odds-val">'+(odds.under_2_5||'-')+'</div></div>';
      html += '</div>';
    }
    html += '<div class="divider"></div>';
  }

  // ─── CANLI TAHMİN ───
  if(isLive && liveData && liveData.probs) {
    html += '<div class="section-label">🔴 Canlı Tahmin (Kalan Süre)</div>';
    html += '<div class="pred-box" style="margin-bottom:10px">';
    html += buildProbRows(liveData.probs);
    html += '</div>';
    if(liveData.over) {
      html += '<div class="section-label">Kalan Sürede Gol</div>';
      html += buildOverGrid(liveData.over);
    }
    html += '<div class="divider"></div>';
  }

  // ─── MAÇ ÖNCESİ TAHMİN ───
  html += '<div class="section-label">📊 ' + (isLive ? 'Maç Öncesi Tahmin' : 'MS Tahmini') + '</div>';
  html += '<div class="pred-box" style="margin-bottom:10px">';
  html += buildProbRows(pregame.probs || {});
  html += '</div>';

  // ─── MS GOL ───
  html += '<div class="section-label">Gol Sayısı (MS)</div>';
  html += buildOverGrid(pregame.over || {});

  // ─── İY TAHMİN ───
  if(pregame.iy_over) {
    html += '<div class="section-label">İlk Yarı Gol</div>';
    html += '<div class="iy-grid">';
    html += '<div class="iy-item"><div class="iy-label">İY 0.5 Üst</div><div class="iy-val">%'+(pregame.iy_over['0.5']||0)+'</div></div>';
    html += '<div class="iy-item"><div class="iy-label">İY 0.5 Alt</div><div class="iy-val" style="color:var(--red)">%'+(100-(pregame.iy_over['0.5']||0)).toFixed(1)+'</div></div>';
    html += '<div class="iy-item"><div class="iy-label">İY 1.5 Üst</div><div class="iy-val">%'+(pregame.iy_over['1.5']||0)+'</div></div>';
    html += '<div class="iy-item"><div class="iy-label">İY 1.5 Alt</div><div class="iy-val" style="color:var(--red)">%'+(100-(pregame.iy_over['1.5']||0)).toFixed(1)+'</div></div>';
    html += '</div>';
  }

  // ─── CANLI İSTATİSTİK ───
  if(liveStats) {
    html += '<div class="divider"></div>';
    html += buildLiveStats(liveStats);
  }

  return html;
}

function buildProbRows(probs) {
  var rows = [['1','Ev Sahibi',''],['X','Beraberlik','green'],['2','Deplasman','red']];
  var html = '';
  rows.forEach(function(r) {
    var val = probs[r[0]] || 0;
    html += '<div class="prob-row">' +
      '<div class="prob-label">'+r[1]+'</div>' +
      '<div class="prob-bar-wrap"><div class="prob-bar '+r[2]+'" style="width:'+Math.min(100,val)+'%"></div></div>' +
      '<div class="prob-val">%'+val+'</div>' +
    '</div>';
  });
  return html;
}

function buildOverGrid(over) {
  var html = '<div class="over-grid">';
  ['0.5','1.5','2.5','3.5'].forEach(function(k) {
    var val = over[k] || 0;
    html += '<div class="over-item"><div class="over-label">+'+k+'</div><div class="over-val">%'+val+'</div></div>';
  });
  html += '</div>';
  return html;
}

function buildLiveStats(ls) {
  var h = ls.home || {};
  var a = ls.away || {};
  var items = [
    ['total_shots','Şut'],['shots_on_target','İsabetli'],
    ['corner_kicks','Korner'],['ball_possession','Top %'],
    ['yellow_cards','Sarı'],['fouls','Faul'],
  ];
  var html = '<div class="section-label">📈 Canlı İstatistik</div><div class="live-stats-grid">';
  items.forEach(function(item) {
    var hv = parseFloat(String(h[item[0]]||0).replace('%','')) || 0;
    var av = parseFloat(String(a[item[0]]||0).replace('%','')) || 0;
    var total = hv + av;
    var hp = total > 0 ? hv/total*100 : 50;
    html += '<div class="stat-row">' +
      '<div class="stat-home-val">'+hv+'</div>' +
      '<div class="stat-bar-wrap">' +
        '<div class="stat-bar-h" style="width:'+hp+'%"></div>' +
        '<div class="stat-bar-a" style="width:'+(100-hp)+'%"></div>' +
      '</div>' +
      '<div class="stat-away-val">'+av+'</div>' +
      '<div class="stat-name">'+item[1]+'</div>' +
    '</div>';
  });
  html += '</div>';
  return html;
}

// ─── PRE-ANALYZE ─────────────────────────────────────────────────────────────
function startPreAnalyze(date) {
  if(analyzeRunning) return;
  analyzeRunning = true;
  analyzeQueue = allFixtures.map(function(f) { return f.fixture_id; });
  runNextAnalyze(date);
}

function runNextAnalyze(date) {
  if(analyzeQueue.length === 0) { analyzeRunning = false; updateStats(); return; }
  var fid = analyzeQueue.shift();
  if(analysisCache[fid]) { setTimeout(function(){ runNextAnalyze(date); }, 50); return; }
  fetchAnalysis(fid, date, function(data) {
    if(data && !data.error) {
      // Badge güncelle
      var el = document.getElementById('badges_' + fid);
      if(el) el.innerHTML = buildBadges(data.signals || [], data);
      // Has-signal class
      if(data.signals && data.signals.length > 0) {
        var card = document.getElementById('card_' + fid);
        if(card) card.classList.add('has-signal');
      }
      // Açık panel varsa güncelle
      if(openCards[fid]) {
        var panel = document.getElementById('detail_' + fid);
        if(panel) panel.innerHTML = buildDetailHtml(data);
      }
    }
    updateStats();
    setTimeout(function(){ runNextAnalyze(date); }, 400);
  });
}

function fetchAnalysis(fid, date, cb) {
  fetch('/api/analyze/' + fid + '?date=' + date)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if(data && !data.error) analysisCache[fid] = data;
      if(cb) cb(data);
    })
    .catch(function() { if(cb) cb(null); });
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('stTotal').textContent = allFixtures.length;
  document.getElementById('stLive').textContent = allFixtures.filter(function(f) {
    return ['1H','2H','HT','ET','PEN'].indexOf(f.status) >= 0;
  }).length;
  document.getElementById('stSignal').textContent = Object.keys(analysisCache).filter(function(fid) {
    var a = analysisCache[fid];
    return a && a.signals && a.signals.length > 0;
  }).length;
}

// ─── FILTER ──────────────────────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  ['btnAll','btnLive','btnSignal'].forEach(function(id) {
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById({all:'btnAll',live:'btnLive',signal:'btnSignal'}[f]).classList.add('active');
  renderFixtures();
}

// ─── CANLI YENİLEME ──────────────────────────────────────────────────────────
setInterval(function() {
  if(!allFixtures.some(function(f){ return ['1H','2H','HT','ET'].indexOf(f.status)>=0; })) return;
  fetch('/api/fixtures?date=' + currentDate)
    .then(function(r){ return r.json(); })
    .then(function(data){
      (data.fixtures||[]).forEach(function(f){
        for(var i=0;i<allFixtures.length;i++){
          if(allFixtures[i].fixture_id===f.fixture_id){ allFixtures[i]=f; break; }
        }
        if(['1H','2H','HT','ET'].indexOf(f.status)>=0) delete analysisCache[f.fixture_id];
      });
      renderFixtures(); updateStats();
    }).catch(function(){});
}, 60000);

// ─── UTILS ───────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pad(n){ return String(n).padStart(2,'0'); }
function getTodayLocal(){
  var now = new Date();
  var local = new Date(now.getTime() + 3*60*60*1000);
  return local.toISOString().split('T')[0];
}

// ─── INIT ────────────────────────────────────────────────────────────────────
(function(){
  currentDate = getTodayLocal();
  window._allDates = [currentDate];
  buildDateTabs([currentDate]);
  loadDate(currentDate);
})();
</script>
